name: PHP CS Fixer

on:
  push:
    branches: [ master, php83 ]
  pull_request:
    branches: [ master, php83 ]

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Run PHP CS Fixer
      uses: docker://ghcr.io/php-cs-fixer/php-cs-fixer:3-php8.3
      with:
        args: fix --config=.php-cs-fixer.php --verbose --diff

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit changes
      if: steps.changes.outputs.has_changes == 'true' && github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Auto-fix code style with PHP CS Fixer

        🤖 Generated with [Claude Code](https://claude.ai/code)

        Co-Authored-By: Claude <noreply@anthropic.com>"
        git push