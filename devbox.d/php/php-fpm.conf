[global]
pid = ${PHPFPM_PID_FILE}
error_log = ${PHPFPM_ERROR_LOG_FILE}
daemonize = yes

[www]
; In devbox, PHP-FPM runs as the shell user — no permission issues with the codebase.
; Uncomment user/group below if you need to run as a different user.
; user = jturner
; group = jturner
listen = 127.0.0.1:${PHPFPM_PORT}
; listen.owner = jturner
; listen.group = jturner

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

; Don't chdir — nginx passes SCRIPT_FILENAME with full path
; chdir is deliberately unset

; Only execute .php files
security.limit_extensions = .php

; Slow request logging for debugging
request_slowlog_timeout = 10s
slowlog = ${PHPFPM_ERROR_LOG_FILE}
